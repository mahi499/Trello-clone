<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trello Clone - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="auth-box">
            <h1>🗂️ Trello Clone</h1>
            <h2>Login</h2>
            <div class="form-group">
                <input type="email" id="email" placeholder="Email" />
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" />
            </div>
            <button onclick="login()">Login</button>
            <p>Don't have an account?
                <a href="register.html">Register here</a>
            </p>
            <p id="message" class="message"></p>
        </div>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                document.getElementById('message').innerText = 'Please fill all fields!';
                document.getElementById('message').style.color = 'red';
                return;
            }

            try {
                const response = await fetch('https://trello-clone-q64i.onrender.com/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const text = await response.text();
                console.log('Response status:', response.status);
                console.log('Response text:', text);

                if (text.startsWith('eyJ')) {
                    // JWT token starts with eyJ
                    localStorage.setItem('token', text);
                    localStorage.setItem('userId', 1);
                    localStorage.setItem('userEmail', email);
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('message').innerText = text;
                    document.getElementById('message').style.color = 'red';
                }

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('message').innerText = 'Server error! Is backend running?';
                document.getElementById('message').style.color = 'red';
            }
        }
    </script>
</body>
</html>
